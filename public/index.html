<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WatchHub</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        <h1>WatchHub</h1>
        <p>Soukromý katalog streamovacích služeb</p>
      </div>

      <div class="profile-selector">
        <label for="profileSelect">Profil</label>
        <select id="profileSelect">
          <option value="">Načítám profily...</option>
        </select>
      </div>
    </div>
  </header>

  <main class="app-layout">
    <section class="content">
      <section class="filters">
        <input
          id="searchInput"
          type="search"
          placeholder="Hledat podle názvu..."
        />

        <select id="serviceFilter">
          <option value="">Všechny služby</option>
          <option value="Netflix">Netflix</option>
          <option value="Disney+">Disney+</option>
          <option value="Max">Max</option>
          <option value="SkyShowtime">SkyShowtime</option>
        </select>

        <select id="typeFilter">
          <option value="">Filmy i seriály</option>
          <option value="movie">Filmy</option>
          <option value="tv">Seriály</option>
        </select>

        <select id="genreFilter">
          <option value="">Všechny žánry</option>
        </select>
      </section>

      <section>
        <h2>Katalog</h2>
        <p id="catalogStatus" class="catalog-status">Načítám katalog...</p>
        <div id="catalog" class="catalog"></div>
      </section>
    </section>
  </main>

  <div id="titleModal" class="modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>

    <section
      class="modal-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <button
        id="closeTitleModal"
        class="modal-close"
        type="button"
        aria-label="Zavřít detail titulu"
      >
        ×
      </button>

      <div id="titleDetail" class="title-detail">
        <h2 id="modalTitle">Detail titulu</h2>
        <p>Načítám detail...</p>
      </div>
    </section>
  </div>

  <footer class="app-footer">
    <p>
      This product uses the TMDB API but is not endorsed or certified by TMDB.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
